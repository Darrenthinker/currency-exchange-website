<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汇率接口快速测试</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; background: #f5f5f5; }
    .box { background: #fff; padding: 1rem; margin: 1rem 0; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    button { background: #2563eb; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; margin: 0.25rem; }
    button:hover { background: #1d4ed8; }
    pre { white-space: pre-wrap; font-size: 12px; background: #f1f5f9; padding: 0.75rem; border-radius: 6px; }
    .ok { color: #15803d; } .err { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>汇率接口快速测试</h1>
  <p>主接口 <code>ExchangeRate-API</code> 无需密钥。UniRate 备用已恢复为浏览器直连，密钥在应用内通过 <code>.env</code> 的 <code>VITE_UNIRATE_API_KEY</code> 配置（见 <code>.env.example</code>）。</p>
  <p>访问：<code>http://localhost:5173/test-api.html</code></p>

  <div class="box">
    <h2>主接口 HKD → CNY</h2>
    <button type="button" id="btn-rate">请求 open.er-api.com</button>
    <pre id="out-rate"></pre>
  </div>

  <script>
    document.getElementById('btn-rate').onclick = async () => {
      const el = document.getElementById('out-rate');
      el.textContent = '请求中…';
      try {
        const r = await fetch('https://open.er-api.com/v6/latest/HKD');
        const t = await r.text();
        el.className = r.ok ? 'ok' : 'err';
        el.textContent = r.status + '\n' + t.slice(0, 4000);
      } catch (e) {
        el.className = 'err';
        el.textContent = String(e);
      }
    };
  </script>
</body>
</html>
